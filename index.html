<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cosmic Cargo: Space Trucker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        
        #gameCanvas { display: block; width: 100vw; height: 100vh; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; z-index: 10; }
        .interactive { pointer-events: auto; }

        .hud { background: rgba(0, 0, 0, 0.7); padding: 15px; border-radius: 10px; border: 1px solid #00ffcc; backdrop-filter: blur(5px); width: fit-content; }
        .hud h1 { font-size: 24px; color: #00ffcc; text-shadow: 0 0 10px #00ffcc; margin-bottom: 5px; }
        
        #monetization-panel { position: absolute; right: 20px; top: 20px; width: 300px; max-height: 90vh; overflow-y: auto; z-index: 20; } /* FIX: Elevated z-index */
        .shop-box { background: rgba(20, 20, 30, 0.9); border: 2px solid #ff00ff; border-radius: 12px; padding: 20px; box-shadow: 0 0 15px rgba(255, 0, 255, 0.4); }
        .shop-box h2 { color: #ff00ff; text-align: center; margin-bottom: 15px; font-size: 20px; letter-spacing: 1px; }
        .product-card { background: rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 12px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .product-card h3 { font-size: 16px; margin-bottom: 5px; color: #fff; }
        .product-card p { font-size: 12px; color: #b3b3b3; margin-bottom: 12px; line-height: 1.4; }

        #mobile-touch-zones { position: absolute; bottom: 0; left: 0; width: 100%; height: 60%; display: flex; pointer-events: auto; z-index: 5; touch-action: none; }
        .touch-btn { flex: 1; height: 100%; opacity: 0; -webkit-tap-highlight-color: transparent; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #ff00ff; border-radius: 10px; }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://www.paypal.com/sdk/js?client-id=sb&currency=USD"></script>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="hud">
            <h1>COSMIC CARGO</h1>
            <div>Distance: <span id="scoreVal">0</span>m</div>
            <div>Cargo Payload: <span id="gemsVal">0</span> Gems</div>
        </div>

        <div id="monetization-panel" class="interactive">
            <div class="shop-box">
                <h2>BLACK MARKET</h2>
                <div class="product-card">
                    <h3>1,000 Premium Crystals</h3>
                    <p>Unlock custom hulls instantly.</p>
                    <div id="paypal-button-pack-1"></div>
                </div>
                <div class="product-card">
                    <h3>Support the Creator ($5)</h3>
                    <p>Help fund deeper sector development.</p>
                    <div id="paypal-button-donate"></div>
                </div>
            </div>
        </div>

        <div id="mobile-touch-zones">
            <div class="touch-btn" id="left-touch"></div>
            <div class="touch-btn" id="right-touch"></div>
        </div>
    </div>

    <script>
        // Game State Variables
        let scene, camera, renderer, playerShip, clock;
        let obstacles = [], gems = [];
        let playerX = 0, targetX = 0, currentScore = 0, currentGems = 0;
        const trackBoundsX = 5.5;

        // FIX: Memory Leak Prevention - Pre-allocate materials
        let sharedGemGeo, sharedGemMat, sharedObsGeo, sharedObsMat;

        window.onload = function() {
            attemptPayPalInit(0);
            initialize3DSpaceEngine();
        };

        // FIX: Network Race Condition - Polling mechanism for PayPal SDK
        function attemptPayPalInit(retries) {
            if (typeof paypal !== 'undefined') {
                bindPayPalButtons();
            } else if (retries < 10) {
                setTimeout(() => attemptPayPalInit(retries + 1), 500);
            } else {
                console.error("PayPal failed to load after 5 seconds. Check network.");
            }
        }

        function bindPayPalButtons() {
            paypal.Buttons({
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '1.99' } }] }),
                onApprove: (data, actions) => actions.order.capture().then(() => alert('1,000 Crystals added!'))
            }).render('#paypal-button-pack-1');

            paypal.Buttons({
                style: { color: 'blue', shape: 'rect', label: 'pay' },
                createOrder: (data, actions) => actions.order.create({ purchase_units: [{ amount: { value: '5.00' } }] }),
                onApprove: (data, actions) => actions.order.capture().then(() => alert('Thank you for your support!'))
            }).render('#paypal-button-donate');
        }

        function initialize3DSpaceEngine() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x020208, 0.012);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3.5, -7.5);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // FIX: Initialize the Game Clock for Framerate Independence
            clock = new THREE.Clock();

            // Lighting
            scene.add(new THREE.AmbientLight(0x444466));
            const keyLight = new THREE.DirectionalLight(0x00ffcc, 1.2);
            keyLight.position.set(5, 15, -10);
            scene.add(keyLight);

            // Ship
            const shipGeometry = new THREE.ConeGeometry(0.5, 2.2, 5);
            shipGeometry.rotateX(Math.PI / 2);
            playerShip = new THREE.Mesh(shipGeometry, new THREE.MeshPhongMaterial({ color: 0x00ffcc }));
            scene.add(playerShip);

            // Setup Shared Materials for spawns
            sharedGemGeo = new THREE.DodecahedronGeometry(0.35);
            sharedGemMat = new THREE.MeshPhongMaterial({ color: 0xff00ff, flatShading: true });
            sharedObsGeo = new THREE.SphereGeometry(0.6, 8, 8);
            sharedObsMat = new THREE.MeshPhongMaterial({ color: 0x555566, flatShading: true });

            // Starfield
            const totalStars = 1000;
            const matrixPositions = new Float32Array(totalStars * 3);
            for(let i = 0; i < totalStars * 3; i += 3) {
                matrixPositions[i] = (Math.random() - 0.5) * 150;
                matrixPositions[i+1] = (Math.random() - 0.5) * 150;
                matrixPositions[i+2] = Math.random() * 400;
            }
            const starMatrixGeometry = new THREE.BufferGeometry();
            starMatrixGeometry.setAttribute('position', new THREE.BufferAttribute(matrixPositions, 3));
            scene.add(new THREE.Points(starMatrixGeometry, new THREE.PointsMaterial({ color: 0xffffff, size: 0.4 })));

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }, false);

            bindHardwareInputRouters();
            executeMainSimulationLoop();
        }

        function bindHardwareInputRouters() {
            window.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') targetX = trackBoundsX;
                if(e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') targetX = -trackBoundsX;
            });
            window.addEventListener('keyup', () => targetX = 0);

            document.getElementById('left-touch').addEventListener('touchstart', (e) => { e.preventDefault(); targetX = trackBoundsX; }, {passive: false});
            document.getElementById('right-touch').addEventListener('touchstart', (e) => { e.preventDefault(); targetX = -trackBoundsX; }, {passive: false});
            document.getElementById('left-touch').addEventListener('touchend', (e) => { e.preventDefault(); targetX = 0; }, {passive: false});
            document.getElementById('right-touch').addEventListener('touchend', (e) => { e.preventDefault(); targetX = 0; }, {passive: false});
        }

        function processProceduralSpawns(delta) {
            // Adjust spawn rate based on delta time to keep density consistent across refresh rates
            if (Math.random() < (3.5 * delta)) { 
                const isGemItem = Math.random() < 0.25;
                const deployedMesh = isGemItem ? new THREE.Mesh(sharedGemGeo, sharedGemMat) : new THREE.Mesh(sharedObsGeo, sharedObsMat);
                
                // Scale random obstacle sizes safely
                if (!isGemItem) {
                    const scale = Math.random() * 0.5 + 0.8;
                    deployedMesh.scale.set(scale, scale, scale);
                }

                deployedMesh.position.set((Math.random() - 0.5) * 14, 0, 160);
                scene.add(deployedMesh);
                
                if (isGemItem) gems.push(deployedMesh);
                else obstacles.push(deployedMesh);
            }
        }

        function executeMainSimulationLoop() {
            requestAnimationFrame(executeMainSimulationLoop);
            
            // FIX: Fetch Delta Time
            const delta = clock.getDelta();
            const moveSpeed = 85 * delta; // Normalize speed

            playerX = THREE.MathUtils.lerp(playerX, targetX, 5 * delta);
            playerShip.position.x = playerX;
            playerShip.rotation.z = (playerX - targetX) * 0.12; 

            processProceduralSpawns(delta);

            if (targetX !== 0 || currentScore > 0) {
                currentScore += Math.floor(10 * delta);
                document.getElementById('scoreVal').innerText = currentScore;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].position.z -= moveSpeed; 
                
                if (obstacles[i].position.z < 0.8 && obstacles[i].position.z > -0.8 && Math.abs(obstacles[i].position.x - playerShip.position.x) < 0.95) {
                    currentScore = 0; 
                }

                if (obstacles[i].position.z < -12) {
                    scene.remove(obstacles[i]);
                    obstacles.splice(i, 1);
                }
            }

            for (let i = gems.length - 1; i >= 0; i--) {
                gems[i].position.z -= moveSpeed;
                gems[i].rotation.y += 2 * delta;

                if (gems[i].position.z < 0.8 && gems[i].position.z > -0.8 && Math.abs(gems[i].position.x - playerShip.position.x) < 0.95) {
                    currentGems++;
                    document.getElementById('gemsVal').innerText = currentGems;
                    scene.remove(gems[i]);
                    gems.splice(i, 1);
                    continue;
                }

                if (gems[i].position.z < -12) {
                    scene.remove(gems[i]);
                    gems.splice(i, 1);
                }
            }

            camera.lookAt(new THREE.Vector3(playerShip.position.x * 0.35, 0, playerShip.position.z + 12));
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
